<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datacore Booking | Book Your Perfect Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white antialiased overflow-x-hidden" style="font-family:'Manrope',sans-serif">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const App = () => {
            const [menuOpen, setMenuOpen] = useState(false);
            useEffect(() => { lucide.createIcons(); }, [menuOpen]);
            return (
                <div className="relative min-h-screen overflow-hidden">
                    <video src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260210_031346_d87182fb-b0af-4273-84d1-c6fd17d6bf0f.mp4" className="absolute inset-0 w-full min-h-screen object-cover z-0" autoPlay loop muted playsInline />
                    <div className="relative z-10 min-h-screen flex flex-col">
                        {/* Navbar */}
                        <nav className="flex items-center justify-between px-6 md:px-[120px] py-4 z-20">
                            <svg width="32" height="32" viewBox="0 0 40 40" fill="white"><circle cx="20" cy="20" r="16"/></svg>
                            <div className="hidden md:flex items-center gap-[10px]">
                                {['Home','Services','Reviews','Contact us'].map((l,i) => (
                                    <a key={l} href="#" className="text-white text-sm font-medium px-[10px] py-1 flex items-center gap-[3px] hover:opacity-80 transition-opacity" style={{ fontFamily: "'Manrope',sans-serif", fontSize: '14px' }}>
                                        {l} {i===1 && <i data-lucide="chevron-down" className="w-5 h-5"></i>}
                                    </a>
                                ))}
                            </div>
                            <div className="hidden md:flex items-center gap-3">
                                <button style={{ fontFamily: "'Manrope',sans-serif", fontSize: '14px', fontWeight: 600, padding: '8px 16px', borderRadius: '8px', background: 'white', color: '#171717', border: '1px solid #d4d4d4' }}>Sign In</button>
                                <button style={{ fontFamily: "'Manrope',sans-serif", fontSize: '14px', fontWeight: 600, padding: '8px 16px', borderRadius: '8px', background: '#7b39fc', color: '#fafafa' }}>Get Started</button>
                            </div>
                            <button className="md:hidden" onClick={() => setMenuOpen(!menuOpen)}><i data-lucide={menuOpen ? 'x' : 'menu'} className="w-6 h-6 text-white"></i></button>
                        </nav>
                        {menuOpen && (
                            <div className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center gap-8 md:hidden">
                                <button className="absolute top-4 right-6" onClick={() => setMenuOpen(false)}><i data-lucide="x" className="w-6 h-6 text-white"></i></button>
                                {['Home','Services','Reviews','Contact us'].map(l => <a key={l} href="#" className="text-white text-2xl">{l}</a>)}
                            </div>
                        )}

                        {/* Hero */}
                        <div className="flex-1 flex flex-col items-center justify-center text-center px-6 mt-32 z-10">
                            {/* Tagline Pill */}
                            <div className="inline-flex items-center gap-2 rounded-[10px] px-3 h-[38px] mb-8" style={{ background: 'rgba(85,80,110,0.4)', backdropFilter: 'blur(8px)', border: '1px solid rgba(164,132,215,0.5)' }}>
                                <span className="px-2 py-0.5 rounded-[6px] text-white text-xs font-medium" style={{ background: '#7b39fc', fontFamily: "'Cabin',sans-serif", fontSize: '14px' }}>New</span>
                                <span className="text-white text-sm font-medium" style={{ fontFamily: "'Cabin',sans-serif", fontSize: '14px' }}>Say Hello to Datacore v3.2</span>
                            </div>

                            <h1 className="text-5xl sm:text-6xl md:text-7xl lg:text-[96px] text-white leading-[1.1] tracking-tight mb-6 max-w-4xl" style={{ fontFamily: "'Instrument Serif', serif" }}>
                                Book your perfect stay instantly <em className="italic">and</em> hassle-free
                            </h1>
                            <p className="text-white/70 text-lg max-w-[662px] mb-8" style={{ fontFamily: "'Inter',sans-serif", fontSize: '18px' }}>
                                Discover handpicked hotels, resorts, and stays across your favorite destinations. Enjoy exclusive deals, fast booking, and 24/7 support.
                            </p>
                            <div className="flex items-center gap-[22px]">
                                <button className="px-6 py-3.5 rounded-[10px] text-white font-medium text-base hover:brightness-110 transition-all" style={{ background: '#7b39fc', fontFamily: "'Cabin',sans-serif" }}>Book a Free Demo</button>
                                <button className="px-6 py-3.5 rounded-[10px] font-medium text-base hover:brightness-125 transition-all" style={{ background: '#2b2344', color: '#f6f7f9', fontFamily: "'Cabin',sans-serif" }}>Get Started Now</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
