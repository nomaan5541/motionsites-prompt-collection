<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindloop | Focus in a Distracted World</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style type="text/tailwindcss">
        @layer components {
            .liquid-glass { background: rgba(255,255,255,0.01); background-blend-mode: luminosity; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); position: relative; overflow: hidden; }
            .liquid-glass::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px; background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, transparent 40%, transparent 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        }
        @keyframes fade-rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-rise { animation: fade-rise 0.8s ease-out both; }
        .animate-fade-rise-delay { animation: fade-rise 0.8s ease-out 0.2s both; }
        .animate-fade-rise-delay-2 { animation: fade-rise 0.8s ease-out 0.4s both; }
    </style>
</head>
<body class="bg-black text-white antialiased overflow-x-hidden" style="font-family:'Inter',sans-serif">
    <div id="root"></div>
    <script type="text/babel">
        const App = () => (
            <section className="relative min-h-screen overflow-hidden bg-black">
                <video src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260324_151826_c7218672-6e92-402c-9e45-f1e0f454bdc4.mp4" className="absolute inset-0 w-full h-full object-cover z-0" autoPlay loop muted playsInline />
                <div className="relative z-10">
                    <nav className="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
                        <span className="text-3xl tracking-tight text-white" style={{ fontFamily: "'Instrument Serif', serif" }}>Velorah<sup className="text-xs">®</sup></span>
                        <div className="hidden md:flex items-center gap-10">
                            {['Home','Studio','About','Journal','Reach Us'].map(l => <a key={l} href="#" className="text-sm text-white hover:opacity-80 transition-opacity">{l}</a>)}
                        </div>
                        <button className="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform">Begin Journey</button>
                    </nav>
                    <div className="flex flex-col items-center justify-center text-center px-6 pt-32 pb-40">
                        <h1 className="text-5xl sm:text-7xl md:text-8xl leading-[0.95] tracking-[-2.46px] max-w-7xl text-white animate-fade-rise" style={{ fontFamily: "'Instrument Serif', serif" }}>
                            Focus in a Distracted World
                        </h1>
                        <p className="text-base sm:text-lg max-w-2xl mt-8 leading-relaxed text-white animate-fade-rise-delay">
                            We're designing tools for deep thinkers, bold creators, and quiet rebels. Amid the chaos, we build digital spaces for sharp focus and inspired work.
                        </p>
                        <button className="liquid-glass rounded-full px-14 py-5 text-base text-white mt-12 hover:scale-[1.03] transition-transform animate-fade-rise-delay-2">
                            Begin Journey
                        </button>
                    </div>
                </div>
            </section>
        );
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
