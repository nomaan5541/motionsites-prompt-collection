<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskly | Work Smarter, Achieve Faster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white text-black antialiased" style="font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const { useEffect } = React;
        const App = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            const brands = ['Dropbox','Notion','Stripe','Vercel','Linear'];
            return (
                <div className="relative min-h-screen overflow-hidden bg-white">
                    {/* BG Glow */}
                    <div className="absolute top-[-100px] left-[-100px] w-[500px] h-[500px] rounded-full opacity-30 pointer-events-none" style={{ background: '#60B1FF', filter: 'blur(120px)' }}></div>
                    <div className="absolute top-[50px] left-[50px] w-[300px] h-[300px] rounded-full opacity-20 pointer-events-none" style={{ background: '#319AFF', filter: 'blur(80px)' }}></div>

                    {/* Navbar */}
                    <div className="sticky top-[30px] z-20 flex justify-center px-4">
                        <nav className="w-fit rounded-[16px] px-6 py-3 flex items-center gap-8" style={{ backdropFilter: 'blur(50px)', background: 'rgba(255,255,255,0.3)', border: '1px solid rgba(0,0,0,0.1)', boxShadow: 'inset 0px 4px 4px 0px rgba(255,255,255,0.25)' }}>
                            <span className="text-lg font-bold">Taskly</span>
                            <div className="hidden md:flex items-center gap-6">
                                {['Home','Features','Company','Pricing'].map(l => <a key={l} href="#" className="text-sm font-medium text-black/70 hover:text-black transition-colors">{l}</a>)}
                            </div>
                            <button className="text-sm font-medium px-4 py-2 rounded-[12px] flex items-center gap-2" style={{ backdropFilter: 'blur(50px)', background: 'rgba(255,255,255,0.3)', border: '1px solid rgba(0,0,0,0.1)', boxShadow: 'inset 0px 4px 4px 0px rgba(255,255,255,0.25)' }}>
                                SignUp <i data-lucide="arrow-right" className="w-4 h-4"></i>
                            </button>
                        </nav>
                    </div>

                    {/* Hero */}
                    <div className="relative z-10 max-w-[1600px] mx-auto px-6 py-16 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                        <div>
                            <div className="flex items-center gap-2 mb-6">
                                <div className="flex gap-0.5">{[1,2,3,4,5].map(i => <span key={i} style={{ color: '#FF801E' }}>★</span>)}</div>
                                <span className="text-sm text-black/60">Rated 4.9/5 by 2700+ customers</span>
                            </div>
                            <h1 className="text-5xl md:text-6xl lg:text-[75px] font-bold leading-[1.05] tracking-[-2px] mb-6">
                                Work smarter, achieve faster
                            </h1>
                            <p className="text-lg text-black/60 max-w-lg mb-8 tracking-[-1px]">
                                Effortlessly manage your projects, collaborate with your team, and achieve your goals with our intuitive task management tool.
                            </p>
                            <button className="flex items-center gap-3 px-6 py-3.5 rounded-[16px] text-white font-medium hover:scale-[1.02] transition-transform" style={{ background: 'rgba(0,132,255,0.8)', backdropFilter: 'blur(2px)', boxShadow: 'inset 0px 4px 4px 0px rgba(255,255,255,0.35)' }}>
                                Get Started Now
                                <span className="w-8 h-8 rounded-full bg-white flex items-center justify-center"><i data-lucide="arrow-right" className="w-4 h-4 text-black"></i></span>
                            </button>
                        </div>
                        <div className="hidden lg:flex justify-center">
                            <video src="https://future.co/images/homepage/glassy-orb/orb-purple.webm" className="scale-125" style={{ mixBlendMode: 'screen', filter: 'hue-rotate(-55deg) saturate(250%) brightness(1.2) contrast(1.1)' }} autoPlay loop muted playsInline />
                        </div>
                    </div>

                    {/* Logos */}
                    <div className="relative z-10 max-w-[1600px] mx-auto px-6 pb-12">
                        <p className="text-sm text-black/40 mb-4">Trusted by Top-tier product companies</p>
                        <div className="flex flex-wrap items-center gap-[100px]">
                            {brands.map(b => <span key={b} className="text-xl font-semibold text-black/30">{b}</span>)}
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
