<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindloop | Content Platform</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, Framer Motion, HLS.js, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(0 0% 0%)',
                        foreground: 'hsl(0 0% 100%)',
                        card: 'hsl(0 0% 5%)',
                        'card-foreground': 'hsl(0 0% 100%)',
                        primary: 'hsl(0 0% 100%)',
                        'primary-foreground': 'hsl(0 0% 0%)',
                        secondary: 'hsl(0 0% 12%)',
                        'secondary-foreground': 'hsl(0 0% 85%)',
                        muted: 'hsl(0 0% 15%)',
                        'muted-foreground': 'hsl(0 0% 65%)',
                        accent: 'hsl(170 15% 45%)',
                        'accent-foreground': 'hsl(0 0% 100%)',
                        border: 'hsl(0 0% 20%)',
                        input: 'hsl(0 0% 18%)',
                        ring: 'hsl(0 0% 40%)',
                        'hero-subtitle': 'hsl(210 17% 95%)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Instrument Serif', 'serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .liquid-glass {
                background: rgba(255, 255, 255, 0.01);
                background-blend-mode: luminosity;
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                position: relative;
                overflow: hidden;
            }
            .liquid-glass::before {
                content: '';
                position: absolute; inset: 0;
                border-radius: inherit;
                padding: 1.4px;
                background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
                -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor;
                mask-composite: exclude;
                pointer-events: none;
            }
        }
    </style>
</head>
<body class="bg-background text-foreground font-sans antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useTransform } = window.Motion;

        const fadeUp = (delay) => ({
            initial: { opacity: 0, y: 20 },
            whileInView: { opacity: 1, y: 0 },
            viewport: { once: true, margin: "-100px" },
            transition: { duration: 0.6, delay, ease: "easeOut" },
        });

        const LogoIcon = ({ size = "w-7 h-7", innerSize = "w-3 h-3" }) => (
            <div className={`${size} rounded-full border-2 border-foreground/60 flex items-center justify-center`}>
                <div className={`${innerSize} rounded-full border border-foreground/60`}></div>
            </div>
        );

        const Navbar = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            return (
                <nav className="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-8 md:px-28 py-4 bg-transparent">
                    <div className="flex items-center gap-12">
                        <div className="flex items-center gap-3">
                            <LogoIcon />
                            <span className="font-bold text-lg">Mindloop</span>
                        </div>
                        <div className="hidden md:flex items-center space-x-6 text-sm">
                            {['Home', 'How It Works', 'Philosophy', 'Use Cases'].map((link, i) => (
                                <React.Fragment key={link}>
                                    <a href="#" className="text-muted-foreground hover:text-foreground transition-colors">{link}</a>
                                    {i < 3 && <span className="text-muted-foreground/30">•</span>}
                                </React.Fragment>
                            ))}
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        {['instagram', 'linkedin', 'twitter'].map(icon => (
                            <button key={icon} className="liquid-glass w-10 h-10 rounded-full flex items-center justify-center">
                                <i data-lucide={icon} className="w-4 h-4"></i>
                            </button>
                        ))}
                    </div>
                </nav>
            );
        };

        const Hero = () => (
            <section className="relative w-full h-screen overflow-hidden flex flex-col items-center justify-center text-center px-6">
                <video 
                    src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260325_120549_0cd82c36-56b3-4dd9-b190-069cfc3a623f.mp4"
                    className="absolute inset-0 w-full h-full object-cover -z-10"
                    autoPlay loop muted playsInline
                />
                <div className="absolute inset-x-0 bottom-0 h-64 bg-gradient-to-t from-background to-transparent -z-10"></div>
                
                <div className="z-10 pt-28 md:pt-32">
                    <div className="flex items-center justify-center space-x-4 mb-8">
                        <div className="flex -space-x-2">
                            {[1,2,3].map(i => (
                                <img key={i} src={`https://i.pravatar.cc/100?img=${i+20}`} className="w-8 h-8 rounded-full border-2 border-background" />
                            ))}
                        </div>
                        <span className="text-muted-foreground text-sm">7,000+ people already subscribed</span>
                    </div>
                    
                    <h1 className="text-5xl md:text-7xl lg:text-8xl font-medium tracking-[-2px] mb-6 max-w-5xl leading-tight">
                        Get <span className="font-serif italic font-normal">Inspired</span> with Us
                    </h1>
                    
                    <p className="text-lg text-hero-subtitle max-w-2xl mx-auto mb-12">
                        Join our feed for meaningful updates, news around technology and a shared journey toward depth and direction.
                    </p>
                    
                    <div className="liquid-glass rounded-full p-2 max-w-lg mx-auto flex items-center shadow-2xl">
                        <input type="email" placeholder="Enter your email" className="bg-transparent flex-1 px-6 text-sm outline-none" />
                        <motion.button 
                            whileHover={{ scale: 1.03 }}
                            whileTap={{ scale: 0.98 }}
                            className="bg-foreground text-background rounded-full px-8 py-3 text-sm font-bold uppercase tracking-widest"
                        >
                            SUBSCRIBE
                        </motion.button>
                    </div>
                </div>
            </section>
        );

        const PlatformCards = () => (
            <section className="pt-52 md:pt-64 pb-20 px-8 lg:px-28">
                <div className="text-center mb-32">
                    <h2 className="text-5xl md:text-7xl lg:text-8xl font-medium mb-12 leading-none">
                        Search has <span className="font-serif italic">changed.</span> Have you?
                    </h2>
                    <p className="text-muted-foreground text-lg max-w-2xl mx-auto">
                        In an era of instant answers, we value the journey of discovery.
                    </p>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-16 md:gap-8 mb-20 max-w-7xl mx-auto">
                    {[
                        { name: 'ChatGPT', icon: 'https://motionsites.ai/assets/hero-grow-ai-preview-BlQ8tAQ-.gif', desc: 'Instant answers for your immediate needs.' },
                        { name: 'Perplexity', icon: 'https://motionsites.ai/assets/hero-evr-ventures-preview-DZxeVFEX.gif', desc: 'Real-time discovery at your fingertips.' },
                        { name: 'Google AI', icon: 'https://motionsites.ai/assets/hero-wealth-preview-B70idl_u.gif', desc: 'The future of search, reimagined.' }
                    ].map((card, i) => (
                        <div key={i} className="flex flex-col items-center text-center">
                            <div className="w-[200px] h-[200px] liquid-glass rounded-2xl flex items-center justify-center mb-8 overflow-hidden">
                                <img src={card.icon} className="w-full h-full object-cover grayscale opacity-60" />
                            </div>
                            <h4 className="font-semibold text-lg mb-2">{card.name}</h4>
                            <p className="text-muted-foreground text-sm max-w-[200px]">{card.desc}</p>
                        </div>
                    ))}
                </div>
                <p className="text-muted-foreground text-sm text-center">If you don't answer the questions, someone else will.</p>
            </section>
        );

        const MissionReveal = () => {
            const containerRef = useRef(null);
            const { scrollYProgress } = useScroll({
                target: containerRef,
                offset: ["start 0.8", "end 0.2"]
            });

            const text1 = "We're building a space where curiosity meets clarity — where readers find depth, writers find reach, and every newsletter becomes a conversation worth having.";
            const words1 = text1.split(" ");
            const highlights = ["curiosity", "meets", "clarity"];

            return (
                <section ref={containerRef} className="pb-32 md:pb-44 flex flex-col items-center">
                    <video 
                        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260325_132944_a0d124bb-eaa1-4082-aa30-2310efb42b4b.mp4"
                        className="w-[800px] h-[800px] object-cover -z-10 mb-20 grayscale opacity-40"
                        autoPlay loop muted playsInline
                    />
                    
                    <div className="max-w-5xl px-8 text-center">
                        <div className="text-2xl md:text-4xl lg:text-5xl font-medium tracking-[-1px] leading-relaxed">
                            {words1.map((word, i) => {
                                const start = i / words1.length;
                                const end = start + (1 / words1.length);
                                const opacity = useTransform(scrollYProgress, [start, end], [0.15, 1]);
                                const cleanWord = word.replace(/[^\w]/g, '').toLowerCase();
                                const isHighlighted = highlights.includes(cleanWord);
                                return (
                                    <motion.span key={i} style={{ opacity }} className={`inline-block mr-3 ${isHighlighted ? 'text-foreground' : 'text-hero-subtitle'}`}>
                                        {word}
                                    </motion.span>
                                );
                            })}
                        </div>
                    </div>
                </section>
            );
        };

        const CTA = () => {
            const videoRef = useRef(null);
            useEffect(() => {
                const video = videoRef.current;
                const streamUrl = 'https://stream.mux.com/8wrHPCX2dC3msyYU9ObwqNdm00u3ViXvOSHUMRYSEe5Q.m3u8';
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                }
            }, []);

            return (
                <section className="relative py-32 md:py-44 overflow-hidden flex items-center justify-center border-t border-border/30">
                    <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover -z-10 grayscale" autoPlay loop muted playsInline />
                    <div className="absolute inset-0 bg-background/45 -z-[5]"></div>
                    
                    <div className="relative z-10 text-center">
                        <div className="flex justify-center mb-8">
                            <LogoIcon size="w-10 h-10" innerSize="w-5 h-5" />
                        </div>
                        <h2 className="text-5xl font-serif italic mb-6">Start Your Journey</h2>
                        <p className="text-muted-foreground mb-12">Experience the future of meaningful content.</p>
                        <div className="flex flex-col sm:flex-row gap-6 justify-center items-center">
                            <button className="bg-foreground text-background rounded-lg px-10 py-4 font-bold text-sm uppercase tracking-widest">Subscribe Now</button>
                            <button className="liquid-glass rounded-lg px-10 py-4 font-bold text-sm uppercase tracking-widest">Start Writing</button>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="py-12 px-8 md:px-28 border-t border-border/30 flex flex-col md:flex-row justify-between items-center text-muted-foreground text-sm">
                <p>© 2026 Mindloop. All rights reserved.</p>
                <div className="flex space-x-12 mt-6 md:mt-0">
                    <a href="#" className="hover:text-foreground">Privacy</a>
                    <a href="#" className="hover:text-foreground">Terms</a>
                    <a href="#" className="hover:text-foreground">Contact</a>
                </div>
            </footer>
        );

        const App = () => (
            <div>
                <Navbar />
                <Hero />
                <PlatformCards />
                <MissionReveal />
                <CTA />
                <Footer />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
