<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Web3 | Own the Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { background: 'hsl(150 20% 5%)', foreground: 'hsl(45 30% 90%)', accent: 'hsl(45 70% 75%)', 'accent-foreground': 'hsl(150 20% 5%)' },
                    keyframes: { marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } } },
                    animation: { marquee: 'marquee 20s linear infinite' },
                }
            }
        }
    </script>
    <style> body { font-family: 'Instrument Serif', serif; } </style>
</head>
<body class="bg-background text-foreground antialiased overflow-visible">
    <div id="root"></div>
    <script type="text/babel">
        const { useEffect } = React;

        const GlowButton = ({ text }) => (
            <button className="relative px-10 py-4 rounded-[43px] bg-accent text-accent-foreground text-xl font-normal overflow-hidden hover:scale-105 transition-transform"
                style={{ boxShadow: '0px 4px 95px 4px hsla(45,70%,50%,0.6)' }}>
                <span className="absolute w-48 h-10 rounded-full top-[-12px] left-1/2 -translate-x-1/2" style={{ background: 'hsl(45 60% 95%)', filter: 'blur(16px)' }}></span>
                <span className="relative z-10">{text}</span>
            </button>
        );

        const App = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            const logos = [
                { icon: 'sun', name: 'Nebulon' }, { icon: 'box', name: 'Prismify' },
                { icon: 'star', name: 'Nova Labs' }, { icon: 'feather', name: 'Zephyr' },
                { icon: 'sparkles', name: 'Ignite' },
            ];

            return (
                <div className="min-h-screen bg-background flex flex-col relative overflow-visible">
                    <video src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260325_094440_a3592600-bd1e-49e5-9bce-a73662061d83.mp4" className="absolute inset-0 w-full h-full object-cover z-0" autoPlay loop muted playsInline />

                    <div className="relative z-10 flex flex-col min-h-screen">
                        {/* Navbar */}
                        <nav className="flex items-center gap-8 px-8 py-6 md:px-16">
                            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" className="shrink-0">
                                <path d="M8 10L14 30L20 16L26 30L32 10" stroke="hsl(45,30%,90%)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                            <div className="flex items-center gap-6">
                                {['Vault','Send','Receive','Trade'].map(l => (
                                    <a key={l} href="#" className="text-foreground text-base tracking-wide hover:opacity-80 transition-opacity">{l}</a>
                                ))}
                            </div>
                        </nav>

                        {/* Main Content */}
                        <div className="flex-1 flex flex-col justify-between px-8 md:px-16 pb-10">
                            <div className="my-auto max-w-3xl">
                                <h1 className="text-6xl md:text-8xl lg:text-[7rem] leading-[0.95] tracking-tight text-foreground mb-12 overflow-visible">
                                    Own the future of<br />your <span className="relative overflow-visible inline-block">
                                        assets.
                                        <span className="absolute inset-0 text-white" style={{ WebkitMaskImage: 'linear-gradient(to bottom left, white 20%, transparent 50%)', filter: 'blur(4px)' }}>assets.</span>
                                        <span className="absolute inset-0 text-white opacity-60" style={{ WebkitMaskImage: 'linear-gradient(to bottom left, white 25%, transparent 55%)', filter: 'blur(8px)' }}>assets.</span>
                                    </span>
                                </h1>
                                <GlowButton text="Launch your orbit" />
                            </div>

                            {/* Logo Marquee */}
                            <div className="mt-auto w-full md:w-1/2 lg:w-1/2">
                                <p className="text-foreground/50 text-base mb-5 text-left">Trusted by top builders</p>
                                <div className="overflow-hidden">
                                    <div className="flex w-max animate-marquee">
                                        {[...logos, ...logos].map((l, i) => (
                                            <div key={i} className="flex items-center gap-3 mx-6">
                                                <i data-lucide={l.icon} className="w-6 h-6 text-foreground/60"></i>
                                                <span className="text-foreground/60 text-2xl tracking-wide whitespace-nowrap">{l.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
