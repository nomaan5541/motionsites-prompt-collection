<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datacore SaaS | One Rapid Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white antialiased overflow-x-hidden" style="font-family:'Manrope',sans-serif">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const videoRef = useRef(null);
            const [menuOpen, setMenuOpen] = useState(false);
            const [videoReady, setVideoReady] = useState(false);

            useEffect(() => {
                lucide.createIcons();
                const v = videoRef.current;
                const url = 'https://stream.mux.com/4IMYGcL01xjs7ek5ANO17JC4VQVUTsojZlnw4fXzwSxc.m3u8';
                if (Hls.isSupported()) {
                    const h = new Hls(); h.loadSource(url); h.attachMedia(v);
                    h.on(Hls.Events.MANIFEST_PARSED, () => { v.play().catch(() => {}); setVideoReady(true); });
                    return () => h.destroy();
                } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                    v.src = url; v.addEventListener('loadeddata', () => setVideoReady(true)); v.play().catch(() => {});
                }
            }, []);
            useEffect(() => { lucide.createIcons(); }, [menuOpen]);

            return (
                <div className="relative min-h-screen overflow-hidden bg-black">
                    {/* Video BG */}
                    <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover -z-10 transition-opacity duration-700" style={{ opacity: videoReady ? 1 : 0 }} muted loop playsInline
                        poster="https://customer-cbeadsgr09pnsezs.cloudflarestream.com/257c7359efd4b4aaebcc03aa8fc78a36/thumbnails/thumbnail.jpg" />
                    <div className="absolute inset-0 bg-black/60 -z-[5]"></div>

                    {/* Navbar */}
                    <nav className="relative z-20 flex items-center justify-between px-6 md:px-[120px] py-4">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 rounded bg-white flex items-center justify-center"><i data-lucide="command" className="w-4 h-4 text-black"></i></div>
                        </div>
                        <div className="hidden md:flex items-center gap-[10px]">
                            {['Home','Services','Reviews','Contact us'].map((l,i) => (
                                <a key={l} href="#" className="text-white text-sm font-medium px-[10px] py-1 flex items-center gap-[3px] hover:opacity-80" style={{ fontFamily: "'Manrope',sans-serif", fontSize: '14px' }}>
                                    {l} {i===1 && <i data-lucide="chevron-down" className="w-5 h-5"></i>}
                                </a>
                            ))}
                        </div>
                        <div className="hidden md:flex items-center gap-3">
                            <button className="px-4 py-2 rounded-lg text-sm font-semibold text-white backdrop-blur-sm" style={{ background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.2)' }}>Sign In</button>
                            <button className="px-4 py-2 rounded-lg text-sm font-semibold" style={{ background: '#7b39fc', color: '#fafafa' }}>Get Started</button>
                        </div>
                        <button className="md:hidden" onClick={() => setMenuOpen(!menuOpen)}><i data-lucide="menu" className="w-6 h-6"></i></button>
                    </nav>
                    {menuOpen && (
                        <div className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center gap-8">
                            <button className="absolute top-4 right-6" onClick={() => setMenuOpen(false)}><i data-lucide="x" className="w-6 h-6"></i></button>
                            {['Home','Services','Reviews','Contact us'].map(l => <a key={l} href="#" className="text-white text-2xl">{l}</a>)}
                        </div>
                    )}

                    {/* Hero */}
                    <div className="relative z-10 flex flex-col items-center text-center px-6 mt-32 pb-24">
                        {/* Badge */}
                        <div className="inline-flex items-center gap-2 rounded-[10px] px-3 h-[38px] mb-8" style={{ background: 'rgba(85,80,110,0.4)', backdropFilter: 'blur(8px)', border: '1px solid rgba(164,132,215,0.5)' }}>
                            <span className="px-2 py-0.5 rounded-[6px] text-xs font-medium text-white" style={{ background: '#f87b52', fontFamily: "'Cabin',sans-serif" }}>New</span>
                            <span className="text-white text-sm font-medium" style={{ fontFamily: "'Cabin',sans-serif" }}>Say Hello to Datacore v3.2</span>
                        </div>

                        <h1 className="text-5xl sm:text-6xl md:text-7xl lg:text-[76px] text-white leading-[1.1] tracking-tight mb-6 max-w-4xl" style={{ fontFamily: "'Inter',sans-serif", fontWeight: 500 }}>
                            Your Networks.<br />One Rapid <span style={{ fontFamily: "'Instrument Serif', serif", fontStyle: 'italic' }}>Interface</span>.
                        </h1>
                        <p className="text-white/70 text-lg max-w-xl mb-8" style={{ fontFamily: "'Inter',sans-serif" }}>
                            Platform helps admins control access, logs, and servers with purpose.
                        </p>
                        <div className="flex items-center gap-[22px]">
                            <button className="px-6 py-3.5 rounded-[10px] text-white font-medium text-base hover:bg-[#6a2ce0] transition-colors" style={{ background: '#7b39fc', fontFamily: "'Cabin',sans-serif" }}>Book a Free Demo</button>
                            <button className="px-6 py-3.5 rounded-[10px] font-medium text-base hover:bg-[#352b54] transition-colors" style={{ background: '#2b2344', color: '#f6f7f9', fontFamily: "'Cabin',sans-serif" }}>Get Started Now</button>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
