<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar.ai | Work Smarter. Move Faster.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDialog { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        .animate-fade-in-overlay { animation: fadeInOverlay 0.4s ease-out forwards; }
        .animate-slide-up-overlay { animation: fadeInDialog 0.5s ease-out forwards; transform: translate(-50%, -50%); }
    </style>
</head>
<body class="bg-white text-black antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Navbar = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            return (
                <nav className="px-6 py-4 flex items-center justify-between max-w-7xl mx-auto animate-fade-in-up" style={{ opacity: 0, animationDelay: '0.1s' }}>
                    <div className="flex items-center gap-2">
                        <i data-lucide="star" className="w-5 h-5 fill-black stroke-black"></i>
                        <span className="text-lg font-semibold">Stellar.ai</span>
                    </div>
                    <div className="hidden md:flex items-center gap-8">
                        {['Solutions', 'For Teams', 'About Us', 'Learn Hub'].map((link, i) => (
                            <a key={link} href="#" className="text-sm text-gray-700 hover:text-black transition-colors flex items-center gap-1">
                                {link}
                                {i < 2 && <i data-lucide="chevron-down" className="w-3 h-3"></i>}
                            </a>
                        ))}
                    </div>
                    <div className="flex items-center gap-4">
                        <a href="#" className="text-sm text-gray-700 hidden md:block">Login</a>
                        <button className="bg-black text-white px-5 py-2.5 rounded-full text-sm font-medium hover:bg-gray-800 transition-colors">
                            Get started free
                        </button>
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            const [activeTab, setActiveTab] = useState('analyse');
            const tabs = [
                { id: 'analyse', label: 'Analyse', icon: 'bar-chart-3' },
                { id: 'train', label: 'Train', icon: 'book-open' },
                { id: 'testing', label: 'Testing', icon: 'users' },
                { id: 'deploy', label: 'Deploy', icon: 'rocket' }
            ];

            useEffect(() => {
                const interval = setInterval(() => {
                    setActiveTab(prev => {
                        const idx = tabs.findIndex(t => t.id === prev);
                        return tabs[(idx + 1) % tabs.length].id;
                    });
                }, 4000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => { lucide.createIcons(); });

            const overlays = {
                analyse: (
                    <div key="analyse" className="animate-fade-in-overlay absolute inset-0 bg-black/40 flex items-center justify-center z-20">
                        <div className="animate-slide-up-overlay absolute left-1/2 top-1/2 bg-white rounded-2xl p-8 w-[90%] max-w-sm shadow-2xl">
                            <h3 className="text-lg font-semibold mb-4">Set Up Your AI Workspace</h3>
                            <div className="w-full bg-gray-100 rounded-full h-2 mb-4"><div className="bg-purple-500 h-2 rounded-full" style={{width:'25%'}}></div></div>
                            <div className="space-y-3">
                                {['Connect Data Source', 'Select Model', 'Configure Pipeline', 'Review & Launch'].map((s, i) => (
                                    <div key={i} className={`flex items-center gap-3 text-sm ${i === 0 ? 'text-black font-medium' : 'text-gray-400'}`}>
                                        <span className={`w-6 h-6 rounded-full ${i === 0 ? 'bg-purple-500 text-white' : 'bg-gray-100 text-gray-400'} flex items-center justify-center text-xs font-bold`}>{i+1}</span>
                                        {s}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                ),
                train: (
                    <div key="train" className="animate-fade-in-overlay absolute inset-0 bg-black/40 flex items-center justify-center z-20">
                        <div className="animate-slide-up-overlay absolute left-1/2 top-1/2 bg-white rounded-2xl p-8 w-[90%] max-w-sm shadow-2xl">
                            <h3 className="text-lg font-semibold mb-4">AI Model Training</h3>
                            <div className="w-full bg-gray-100 rounded-full h-2 mb-6"><div className="bg-orange-500 h-2 rounded-full" style={{width:'67%'}}></div></div>
                            <div className="grid grid-cols-2 gap-4">
                                {[{l:'Accuracy',v:'94.2%'},{l:'Loss',v:'0.031'},{l:'Epochs',v:'67/100'},{l:'ETA',v:'12 min'}].map(m => (
                                    <div key={m.l} className="bg-gray-50 rounded-lg p-3"><div className="text-xs text-gray-500">{m.l}</div><div className="text-lg font-semibold">{m.v}</div></div>
                                ))}
                            </div>
                        </div>
                    </div>
                ),
                testing: (
                    <div key="testing" className="animate-fade-in-overlay absolute inset-0 bg-black/40 flex items-center justify-center z-20">
                        <div className="animate-slide-up-overlay absolute left-1/2 top-1/2 bg-white rounded-2xl p-8 w-[90%] max-w-sm shadow-2xl">
                            <h3 className="text-lg font-semibold mb-2">Test Suite Results</h3>
                            <div className="flex items-center gap-2 mb-6"><span className="w-3 h-3 rounded-full bg-green-500"></span><span className="text-sm text-green-600 font-medium">All Tests Passed</span></div>
                            <div className="text-5xl font-bold text-center mb-2">127/127</div>
                            <div className="text-sm text-gray-500 text-center">tests passed successfully</div>
                        </div>
                    </div>
                ),
                deploy: (
                    <div key="deploy" className="animate-fade-in-overlay absolute inset-0 bg-black/40 flex items-center justify-center z-20">
                        <div className="animate-slide-up-overlay absolute left-1/2 top-1/2 bg-white rounded-2xl p-8 w-[90%] max-w-sm shadow-2xl">
                            <h3 className="text-lg font-semibold mb-4">Deploy to Production</h3>
                            <div className="space-y-3 mb-6">
                                {['Build optimized', 'Tests passed', 'Security scanned', 'CDN configured'].map(s => (
                                    <div key={s} className="flex items-center gap-3 text-sm"><i data-lucide="check-circle-2" className="w-4 h-4 text-green-500"></i>{s}</div>
                                ))}
                            </div>
                            <button className="w-full bg-black text-white py-3 rounded-lg text-sm font-medium">Deploy Now</button>
                        </div>
                    </div>
                )
            };

            return (
                <section className="px-6 pt-24 pb-32 max-w-7xl mx-auto text-center">
                    {/* Reviews Badge */}
                    <div className="animate-fade-in-up inline-flex items-center gap-2 mb-8" style={{ opacity: 0, animationDelay: '0.2s' }}>
                        <span className="w-6 h-6 border border-gray-300 rounded flex items-center justify-center">
                            <i data-lucide="star" className="w-3.5 h-3.5 fill-black stroke-black"></i>
                        </span>
                        <span className="text-sm font-medium">4.9 rating from 18.3K+ users</span>
                    </div>

                    {/* Main Heading */}
                    <h1 className="animate-fade-in-up text-6xl md:text-7xl lg:text-[80px] font-normal leading-[1.1] tracking-tight mb-5" style={{ opacity: 0, animationDelay: '0.3s' }}>
                        Work Smarter. Move Faster.<br />
                        <span className="bg-gradient-to-r from-black via-gray-500 to-gray-400 bg-clip-text text-transparent">AI Powers You Up.</span>
                    </h1>

                    {/* Subheading */}
                    <p className="animate-fade-in-up text-lg md:text-xl text-gray-600 mb-8 max-w-2xl mx-auto" style={{ opacity: 0, animationDelay: '0.4s' }}>
                        Intelligent automation syncs with the tools you love to streamline tasks, boost output, and save time.
                    </p>

                    {/* CTA */}
                    <button className="animate-fade-in-up bg-black text-white px-8 py-3 rounded-full text-base font-medium hover:bg-gray-800 transition-colors mb-12" style={{ opacity: 0, animationDelay: '0.5s' }}>
                        Begin Free Trial
                    </button>

                    {/* Tab Bar */}
                    <div className="animate-fade-in-up flex justify-center mb-12" style={{ opacity: 0, animationDelay: '0.6s' }}>
                        <div className="bg-gray-100 rounded-lg p-1 inline-flex items-center">
                            {tabs.map((tab, i) => (
                                <React.Fragment key={tab.id}>
                                    <button 
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-all ${activeTab === tab.id ? 'bg-white text-black shadow-sm' : 'text-gray-600'}`}
                                    >
                                        <i data-lucide={tab.icon} className="w-4 h-4"></i>
                                        <span className="hidden md:inline">{tab.label}</span>
                                    </button>
                                    {i < tabs.length - 1 && <div className="w-px h-5 bg-gray-300 mx-1 hidden md:block"></div>}
                                </React.Fragment>
                            ))}
                        </div>
                    </div>

                    {/* Video + Overlay */}
                    <div className="animate-fade-in-up relative rounded-3xl overflow-hidden h-[400px] md:h-[500px]" style={{ opacity: 0, animationDelay: '0.7s' }}>
                        <video 
                            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260319_165750_358b1e72-c921-48b7-aaac-f200994f32fb.mp4"
                            className="w-full h-full object-cover"
                            autoPlay loop muted playsInline
                        />
                        {overlays[activeTab]}
                    </div>

                    {/* Company Logos */}
                    <div className="animate-fade-in-up flex flex-wrap justify-center items-center gap-12 mt-24 opacity-40" style={{ opacity: 0, animationDelay: '0.8s' }}>
                        {['INTERSCOPE', 'SPOTIFY', 'Nexera', 'M3', 'LAURA COLE', 'vertex'].map(logo => (
                            <span key={logo} className={`text-lg font-semibold tracking-wider ${logo === 'M3' ? 'font-serif italic' : ''}`}>{logo}</span>
                        ))}
                    </div>
                </section>
            );
        };

        const App = () => (
            <div>
                <Navbar />
                <Hero />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
