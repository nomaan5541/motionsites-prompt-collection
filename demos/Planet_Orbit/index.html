<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Orbit | Accelerate Revenue Growth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { background: 'hsl(260 87% 3%)', foreground: 'hsl(40 6% 95%)', primary: '#87FB89', 'primary-fg': 'hsl(0 0% 5%)', 'hero-sub': 'hsl(40 6% 82%)', secondary: 'hsl(240 4% 16%)' },
            keyframes: { marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } } },
            animation: { marquee: 'marquee 20s linear infinite' } } } }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .liquid-glass { background: rgba(255,255,255,0.01); background-blend-mode: luminosity; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); position: relative; overflow: hidden; }
            .liquid-glass::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px; background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, transparent 40%, transparent 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        }
    </style>
</head>
<body class="bg-background text-foreground antialiased overflow-x-hidden" style="font-family:'Inter',sans-serif">
    <div id="root"></div>
    <script type="text/babel">
        const { useEffect } = React;
        const logos = ['Vortex','Nimbus','Prysma','Cirrus','Kynder','Halcyn'];
        const App = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            return (
                <div className="relative min-h-screen bg-background overflow-hidden">
                    <video src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260309_042944_4a2205b7-b061-490a-852b-92d9e9955ce9.mp4" className="absolute inset-0 w-full h-full object-cover z-0" autoPlay loop muted playsInline />
                    <div className="relative z-10 min-h-screen flex flex-col items-center">
                        {/* Navbar Pill */}
                        <nav className="liquid-glass rounded-3xl max-w-[850px] mx-auto mt-4 px-4 py-2.5 flex items-center justify-between w-full">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: 'linear-gradient(135deg, #87FB89, #4ade80)' }}>
                                    <i data-lucide="crosshair" className="w-4 h-4 text-black"></i>
                                </div>
                                <span className="text-xl font-semibold text-foreground">APEX</span>
                            </div>
                            <div className="hidden md:flex items-center gap-1">
                                {['Features','Solutions','Plans','Learning'].map((l,i) => (
                                    <button key={l} className="text-base text-foreground/90 px-3 py-1.5 rounded-lg hover:bg-white/5 transition-colors flex items-center gap-1">
                                        {l} {(i===0||i===3) && <i data-lucide="chevron-down" className="w-4 h-4"></i>}
                                    </button>
                                ))}
                            </div>
                            <button className="bg-primary text-primary-fg rounded-xl px-4 py-2 text-sm font-medium">Sign Up</button>
                        </nav>

                        {/* Badge */}
                        <div className="liquid-glass rounded-full px-3 py-1.5 flex items-center gap-2 mt-12">
                            <span className="text-foreground text-sm">Nova+ Launched!</span>
                            <span className="bg-white/5 rounded-full px-3 py-1 text-foreground text-xs flex items-center gap-1">Explore <i data-lucide="chevron-right" className="w-3 h-3"></i></span>
                        </div>

                        {/* Heading */}
                        <h1 className="text-4xl sm:text-6xl lg:text-7xl font-semibold tracking-tight leading-[1.05] max-w-5xl text-center mt-8 px-4" style={{ color: 'hsl(40 10% 96%)' }}>
                            Accelerate Your<br />Revenue Growth Now
                        </h1>
                        <p className="text-lg max-w-md text-center mt-6 opacity-80" style={{ color: 'hsl(40 6% 82%)' }}>
                            Drive your funnel forward with clever workflows, analytics, and seamless lead management.
                        </p>

                        {/* CTAs */}
                        <div className="flex items-center gap-4 mt-8">
                            <button className="bg-primary text-primary-fg rounded-full px-6 py-3 text-base font-medium hover:bg-primary/90 transition-colors">Start Free Right Now</button>
                            <button className="liquid-glass text-foreground rounded-full px-6 py-3 text-base hover:bg-white/5 transition-colors">Schedule a Consult</button>
                        </div>

                        {/* Marquee */}
                        <div className="mt-auto pb-8 w-full max-w-5xl mx-auto flex items-center gap-12 px-4">
                            <p className="text-foreground/50 text-sm shrink-0">Relied on by brands<br />across the globe</p>
                            <div className="overflow-hidden flex-1">
                                <div className="flex w-max animate-marquee gap-16 items-center">
                                    {[...logos,...logos].map((n,i) => (
                                        <div key={i} className="shrink-0 flex items-center gap-2">
                                            <div className="liquid-glass w-6 h-6 rounded-lg flex items-center justify-center text-xs font-bold text-foreground/70">{n[0]}</div>
                                            <span className="text-base font-semibold whitespace-nowrap text-foreground">{n}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
