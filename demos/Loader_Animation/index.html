<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Screen Component</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { bg: '#0a0a0a', text: '#f5f5f5', muted: '#888888', stroke: '#1f1f1f' }, fontFamily: { display: ['Instrument Serif', 'serif'] } } } }
    </script>
</head>
<body class="bg-bg text-text antialiased overflow-hidden" style="font-family:'Inter',sans-serif">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const LoadingScreen = ({ onComplete }) => {
            const [progress, setProgress] = useState(0);
            const [wordIndex, setWordIndex] = useState(0);
            const onCompleteRef = useRef(onComplete);
            onCompleteRef.current = onComplete;
            const words = ['Design', 'Create', 'Inspire'];

            useEffect(() => {
                const start = performance.now();
                let raf;
                const tick = (now) => {
                    const elapsed = now - start;
                    const p = Math.min(100, (elapsed / 2700) * 100);
                    setProgress(p);
                    if (p < 100) raf = requestAnimationFrame(tick);
                    else setTimeout(() => onCompleteRef.current(), 400);
                };
                raf = requestAnimationFrame(tick);
                const interval = setInterval(() => {
                    setWordIndex(prev => { if (prev < 2) return prev + 1; return prev; });
                }, 900);
                return () => { cancelAnimationFrame(raf); clearInterval(interval); };
            }, []);

            return (
                <motion.div exit={{ opacity: 0 }} transition={{ duration: 0.6, ease: [0.4, 0, 0.2, 1] }}
                    className="fixed inset-0 z-[9999] bg-bg flex flex-col">
                    <motion.div initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.6, delay: 0.1 }}
                        className="absolute top-8 left-8 md:top-12 md:left-12 text-xs md:text-sm text-muted uppercase tracking-[0.3em]">
                        Portfolio
                    </motion.div>

                    <div className="absolute inset-0 flex items-center justify-center">
                        <AnimatePresence mode="wait">
                            <motion.span key={wordIndex}
                                initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}
                                transition={{ duration: 0.4, ease: [0.4, 0, 0.2, 1] }}
                                className="text-4xl md:text-6xl lg:text-7xl font-display italic text-text/80">
                                {words[wordIndex]}
                            </motion.span>
                        </AnimatePresence>
                    </div>

                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.6, delay: 0.1 }}
                        className="absolute bottom-8 right-8 md:bottom-12 md:right-12 text-6xl md:text-8xl lg:text-9xl font-display text-text tabular-nums">
                        {Math.round(progress).toString().padStart(3, '0')}
                    </motion.div>

                    <div className="absolute bottom-0 left-0 right-0 h-[3px] bg-stroke/50">
                        <motion.div className="h-full origin-left" initial={{ scaleX: 0 }} animate={{ scaleX: progress / 100 }} transition={{ duration: 0.1, ease: 'linear' }}
                            style={{ background: 'linear-gradient(90deg, #89AACC 0%, #4E85BF 100%)', boxShadow: '0 0 8px rgba(137,170,204,0.35)' }}></motion.div>
                    </div>
                </motion.div>
            );
        };

        const MainContent = () => (
            <div className="min-h-screen bg-bg flex items-center justify-center">
                <div className="text-center">
                    <h1 className="text-5xl md:text-7xl font-display italic text-text mb-4">Welcome</h1>
                    <p className="text-muted text-lg">Your content loads here after the animation.</p>
                </div>
            </div>
        );

        const App = () => {
            const [isLoading, setIsLoading] = useState(true);
            return (
                <>
                    <AnimatePresence mode="wait">
                        {isLoading && <LoadingScreen onComplete={() => setIsLoading(false)} />}
                    </AnimatePresence>
                    <div style={{ opacity: isLoading ? 0 : 1, transition: 'opacity 0.5s ease-out' }}>
                        <MainContent />
                    </div>
                </>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
