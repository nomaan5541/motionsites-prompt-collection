<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Accelerate Your Revenue Growth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(260 87% 3%)', foreground: 'hsl(40 6% 95%)',
                        primary: 'hsl(262 83% 58%)', 'primary-foreground': 'hsl(0 0% 100%)',
                        secondary: 'hsl(240 4% 16%)', muted: 'hsl(240 4% 16%)',
                        'muted-foreground': 'hsl(240 5% 65%)', border: 'hsl(240 4% 20%)',
                        card: 'hsl(240 6% 9%)', 'hero-heading': 'hsl(40 10% 96%)', 'hero-sub': 'hsl(40 6% 82%)',
                    },
                    fontFamily: { body: ['Inter', 'system-ui', 'sans-serif'] },
                    keyframes: { marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } } },
                    animation: { marquee: 'marquee 20s linear infinite' },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .liquid-glass {
                background: rgba(255,255,255,0.01); background-blend-mode: luminosity;
                backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
                border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
                position: relative; overflow: hidden;
            }
            .liquid-glass::before {
                content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
                background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, transparent 40%, transparent 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
                -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
            }
        }
    </style>
</head>
<body class="bg-background text-foreground font-body antialiased overflow-x-hidden" style="font-family:'Inter',system-ui,sans-serif">
    <div id="root"></div>
    <script type="text/babel">
        const { useEffect, useRef } = React;

        const Navbar = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            return (
                <div className="flex justify-center py-5">
                    <div className="liquid-glass rounded-3xl p-2 max-w-[850px] w-full flex items-center justify-between gap-6 mx-4">
                        <div className="flex items-center gap-3 pl-2">
                            <div className="w-7 h-7 rounded-lg bg-gradient-to-b from-secondary to-muted border border-border flex items-center justify-center">
                                <svg width="14" height="14" viewBox="0 0 20 20"><circle cx="10" cy="10" r="3" stroke="white" fill="none" strokeWidth="1.5"/><line x1="10" y1="2" x2="10" y2="6" stroke="white" strokeWidth="1.5"/><line x1="10" y1="14" x2="10" y2="18" stroke="white" strokeWidth="1.5"/><line x1="2" y1="10" x2="6" y2="10" stroke="white" strokeWidth="1.5"/><line x1="14" y1="10" x2="18" y2="10" stroke="white" strokeWidth="1.5"/></svg>
                            </div>
                            <span className="text-xl font-semibold tracking-tight">APEX</span>
                        </div>
                        <div className="hidden md:flex items-center gap-1">
                            {['Features', 'Solutions', 'Plans', 'Learning'].map((l, i) => (
                                <button key={l} className="px-3 py-2 text-foreground/90 text-base hover:text-foreground transition-colors flex items-center gap-1">
                                    {l} {(i === 0 || i === 3) && <i data-lucide="chevron-down" className="w-4 h-4"></i>}
                                </button>
                            ))}
                        </div>
                        <button className="bg-primary text-primary-foreground rounded-xl px-4 py-2 text-sm font-medium">Sign Up</button>
                    </div>
                </div>
            );
        };

        const Hero = () => (
            <section className="bg-background relative overflow-hidden">
                <Navbar />
                <div className="flex flex-col items-center pt-20 px-4">
                    <div className="liquid-glass rounded-full pl-3 pr-1 py-1 flex items-center gap-2 mb-8">
                        <span className="text-foreground text-xs">Nova+ Launched!</span>
                        <span className="rounded-full bg-white/5 px-3 py-0.5 text-xs flex items-center gap-1">Explore <i data-lucide="chevron-right" className="w-3 h-3"></i></span>
                    </div>
                    <h1 className="text-hero-heading text-center text-4xl sm:text-6xl lg:text-7xl font-semibold leading-[1.05] tracking-tight max-w-5xl">
                        Accelerate Your<br />Revenue Growth Now
                    </h1>
                    <p className="text-hero-sub text-center text-lg leading-8 max-w-md mt-4 opacity-80">
                        Drive your funnel forward with clever workflows, analytics, and seamless lead management.
                    </p>
                    <div className="flex items-center gap-4 mt-8 mb-16">
                        <button className="bg-primary text-primary-foreground rounded-full px-6 py-3 text-base font-medium">Start Free Right Now</button>
                        <button className="liquid-glass text-foreground rounded-full px-6 py-3 text-base font-normal hover:bg-white/5 transition-colors">Schedule a Consult</button>
                    </div>
                </div>
            </section>
        );

        const SocialProof = () => {
            const videoRef = useRef(null);
            const logos = ['Vortex', 'Nimbus', 'Prysma', 'Cirrus', 'Kynder', 'Halcyn'];
            useEffect(() => {
                const v = videoRef.current; if (!v) return; let raf;
                const fade = () => { if (!v.duration) { raf = requestAnimationFrame(fade); return; } const t=v.currentTime, d=v.duration; v.style.opacity = t < 0.5 ? t/0.5 : t > d-0.5 ? (d-t)/0.5 : 1; raf = requestAnimationFrame(fade); };
                v.addEventListener('ended', () => { v.style.opacity = 0; setTimeout(() => { v.currentTime = 0; v.play(); }, 100); });
                v.play(); raf = requestAnimationFrame(fade); return () => cancelAnimationFrame(raf);
            }, []);
            useEffect(() => { lucide.createIcons(); }, []);
            return (
                <section className="relative w-full overflow-hidden">
                    <video ref={videoRef} src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260308_114720_3dabeb9e-2c39-4907-b747-bc3544e2d5b7.mp4" className="absolute inset-0 w-full h-full object-cover" style={{ opacity: 0 }} muted playsInline />
                    <div className="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background"></div>
                    <div className="relative z-10 flex flex-col items-center pt-16 pb-24 px-4 gap-20">
                        <div className="flex items-center gap-8 flex-wrap justify-center">
                            {[{ icon: 'clock', label: '3-5 week turnaround' }, { icon: 'dollar-sign', label: 'Upfront cost clarity' }, { icon: 'shield-check', label: 'Full refund assurance' }].map(s => (
                                <div key={s.label} className="flex items-center gap-3 text-foreground/80 text-sm">
                                    <span className="liquid-glass w-8 h-8 rounded-lg flex items-center justify-center"><i data-lucide={s.icon} className="w-4 h-4 text-foreground/70"></i></span>
                                    <span className="font-medium">{s.label}</span>
                                </div>
                            ))}
                        </div>
                        <div className="h-40"></div>
                        <div className="w-full max-w-5xl flex items-center gap-12">
                            <p className="text-foreground/50 text-sm shrink-0 whitespace-nowrap">Relied on by brands<br />across the globe</p>
                            <div className="overflow-hidden flex-1">
                                <div className="flex w-max animate-marquee gap-16 items-center">
                                    {[...logos, ...logos].map((n, i) => (
                                        <div key={i} className="shrink-0 flex items-center gap-2">
                                            <div className="liquid-glass w-6 h-6 rounded-lg flex items-center justify-center text-xs font-bold text-foreground/70">{n[0]}</div>
                                            <span className="text-base font-semibold whitespace-nowrap">{n}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const App = () => (<div><Hero /><SocialProof /></div>);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
