<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness E-commerce | Affordable Medication</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, Framer Motion, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(0 0% 98%)',
                        foreground: 'hsl(11 6% 11%)',
                    },
                    borderRadius: {
                        full: '9999px',
                    },
                    boxShadow: {
                        'premium': '2px 4px 12px rgba(0,0,0,0.08)',
                    },
                    animation: {
                        'marquee': 'marquee 30s linear infinite',
                        'marquee-reverse': 'marquee-reverse 30s linear infinite',
                        'gradient-shift': 'gradient-shift 0.8s linear infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateY(0)' },
                            '100%': { transform: 'translateY(-50%)' },
                        },
                        'marquee-reverse': {
                            '0%': { transform: 'translateY(-50%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        'gradient-shift': {
                            '0%': { backgroundPosition: '0% 50%' },
                            '100%': { backgroundPosition: '200% 50%' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .btn-gradient-border {
                @apply relative p-[2px] rounded-full overflow-hidden;
                background: linear-gradient(to right, #84a9fa, #fb6fec, #fba69e, #fdd4a3, #fb6fec, #84a9fa);
                background-size: 200% auto;
                transition: background-position 0.8s linear;
            }
            .btn-gradient-border:hover {
                background-position: 200% center;
            }
            .btn-gradient-border-inner {
                @apply bg-background rounded-full px-6 py-2 text-sm font-medium flex items-center gap-2 h-full w-full;
            }
        }
    </style>
</head>
<body class="bg-background text-foreground antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion } = window.Motion;

        const Navbar = () => (
            <nav className="sticky top-0 w-full z-50 bg-gray-50/80 backdrop-blur-md border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                <div className="text-xl font-semibold">Logo</div>
                <div className="hidden lg:flex space-x-8">
                    {['Weight Loss', 'Strength', 'Anti-Aging', 'Hair Growth', 'Mood', 'More'].map(link => (
                        <a key={link} href="#" className="text-sm font-medium hover:opacity-60 transition-opacity">{link}</a>
                    ))}
                </div>
                <div className="flex items-center gap-4">
                    <button className="hidden md:block bg-foreground text-background px-6 py-2 rounded-full text-sm font-medium hover:opacity-90 transition-opacity">
                        Get started
                    </button>
                    <div className="btn-gradient-border cursor-pointer">
                        <div className="btn-gradient-border-inner">
                            <i data-lucide="user" className="w-4 h-4"></i>
                            Login
                        </div>
                    </div>
                </div>
            </nav>
        );

        const Hero = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            
            const images = [
                "https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=400&h=600&fit=crop",
                "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=400&h=600&fit=crop",
                "https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=400&h=600&fit=crop",
                "https://images.unsplash.com/photo-1511174511562-5f7f185854c8?w=400&h=600&fit=crop"
            ];

            return (
                <section className="px-6 lg:px-24 py-20 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                    <div>
                        <div className="inline-flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-premium mb-8">
                            <div className="w-5 h-5 bg-green-500 rounded-full flex items-center justify-center text-[10px] text-white">★</div>
                            <span className="text-xs font-medium">4.5 Average Rating • 453 Reviews</span>
                        </div>
                        <h1 className="text-4xl md:text-5xl lg:text-6xl font-semibold leading-tight mb-8">
                            Compounded Semaglutide for Weight Loss
                        </h1>
                        <div className="space-y-4 mb-8">
                            {[
                                { icon: 'syringe', text: 'Prescribed by board-certified doctors' },
                                { icon: 'dollar-sign', text: 'No insurance needed. Transparent pricing.' },
                                { icon: 'truck', text: 'Free, fast, and discreet shipping' }
                            ].map((item, i) => (
                                <div key={i} className="flex items-center gap-3 text-sm font-medium opacity-80">
                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                    {item.text}
                                </div>
                            ))}
                        </div>
                        <div className="h-px bg-gray-200 w-full mb-8"></div>
                        <div className="flex items-center gap-6 mb-8">
                            <div className="flex flex-col">
                                <span className="text-3xl font-bold">$296/mo</span>
                                <span className="text-[10px] opacity-60">*No matter the dose</span>
                            </div>
                            <button className="bg-foreground text-background px-10 py-4 rounded-full font-bold uppercase text-xs tracking-widest shadow-lg hover:scale-105 transition-transform">
                                Get Started
                            </button>
                        </div>
                        <div className="flex items-center gap-4 bg-white p-4 rounded-3xl shadow-premium max-w-sm">
                            <img src="https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=100&h=100&fit=crop" className="w-12 h-12 rounded-xl object-cover" />
                            <div className="flex-1">
                                <span className="text-sm font-semibold block">Is This Right for You?</span>
                                <a href="#" className="text-xs text-blue-500 font-medium flex items-center gap-1">Take the quiz <i data-lucide="arrow-right" className="w-3 h-3"></i></a>
                            </div>
                        </div>
                    </div>
                    
                    <div className="hidden lg:grid grid-cols-2 gap-6 h-[600px] overflow-hidden relative">
                        <div className="animate-marquee space-y-6">
                            {[...images, ...images].map((img, i) => (
                                <img key={i} src={img} className="w-full h-80 object-cover rounded-3xl" />
                            ))}
                        </div>
                        <div className="animate-marquee-reverse space-y-6">
                            {[...images, ...images].map((img, i) => (
                                <img key={i} src={img} className="w-full h-80 object-cover rounded-3xl" />
                            ))}
                        </div>
                        <div className="absolute inset-x-0 top-0 h-32 bg-gradient-to-b from-background to-transparent pointer-events-none"></div>
                        <div className="absolute inset-x-0 bottom-0 h-32 bg-gradient-to-t from-background to-transparent pointer-events-none"></div>
                    </div>
                </section>
            );
        };

        const ProductsGrid = () => (
            <section className="px-6 py-24 bg-white">
                <div className="text-center mb-16">
                    <span className="text-[10px] font-bold uppercase tracking-[0.2em] opacity-40">Our Meds</span>
                    <h2 className="text-3xl md:text-4xl font-semibold mt-4">Medication Made Affordable Without The Insurance</h2>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
                    {[
                        { title: 'Weight Loss', price: '$296', img: 'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=600&h=600&fit=crop' },
                        { title: 'Anti-Aging', price: '$120', img: 'https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=600&h=600&fit=crop' },
                        { title: 'Hair Growth', price: '$45', img: 'https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=600&h=600&fit=crop' }
                    ].map((p, i) => (
                        <div key={i} className="group">
                            <div className="rounded-2xl overflow-hidden shadow-premium mb-6">
                                <img src={p.img} className="w-full aspect-square object-cover group-hover:scale-105 transition-transform duration-500" />
                            </div>
                            <h3 className="text-2xl font-semibold mb-2">{p.title}</h3>
                            <div className="text-lg mb-6">{p.price}<span className="text-sm opacity-60"> per month</span></div>
                            <div className="btn-gradient-border cursor-pointer w-full">
                                <div className="btn-gradient-border-inner justify-center uppercase text-[10px] tracking-widest font-bold h-12">
                                    Get Started
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            </section>
        );

        const ScienceNature = () => (
            <section className="bg-gray-50 py-28 px-6 text-center">
                <h2 className="text-3xl md:text-4xl font-semibold mb-12">Discover the harmony of science and nature.</h2>
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6 max-w-7xl mx-auto">
                    {[
                        { icon: 'rabbit', label: 'Cruelty\nFree' },
                        { icon: 'tree-pine', label: 'Plant\nBased' },
                        { icon: 'leaf', label: 'Natural\nIngredients' },
                        { icon: 'flask-conical', label: 'Science\nBacked' },
                        { icon: 'atom', label: 'Clinical\nTested' },
                        { icon: 'wheat', label: 'Vegan\nFriendly' }
                    ].map((f, i) => (
                        <div key={i} className="bg-white rounded-2xl p-8 shadow-premium flex flex-col items-center">
                            <i data-lucide={f.icon} className="w-16 h-16 stroke-[1.5] text-green-600/60 mb-6"></i>
                            <span className="text-sm font-medium whitespace-pre-line leading-tight opacity-70">{f.label}</span>
                        </div>
                    ))}
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="bg-zinc-900 text-white py-20 px-6 lg:px-24">
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 border-b border-white/10 pb-16">
                    <div>
                        <div className="text-2xl font-bold mb-8">Logo</div>
                        <div className="flex max-w-sm">
                            <input type="email" placeholder="Your email address" className="bg-white/5 border border-white/10 rounded-full px-6 py-3 flex-1 text-sm outline-none focus:border-white/20" />
                            <button className="bg-white text-zinc-900 rounded-full px-8 ml-2 font-bold text-xs uppercase tracking-widest">Join</button>
                        </div>
                        <p className="text-[10px] text-white/40 mt-4 max-w-sm">By subscribing, you agree to our Privacy Policy and Terms of Service.</p>
                    </div>
                    <div className="grid grid-cols-3 gap-8">
                        <div>
                            <h4 className="text-sm font-bold uppercase tracking-widest mb-6 opacity-40">Popular</h4>
                            <ul className="space-y-4 text-sm opacity-70">
                                <li>Weight Loss</li>
                                <li>Anti-Aging</li>
                                <li>Mental Health</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="text-sm font-bold uppercase tracking-widest mb-6 opacity-40">Company</h4>
                            <ul className="space-y-4 text-sm opacity-70">
                                <li>About Us</li>
                                <li>Science</li>
                                <li>Contact</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="text-sm font-bold uppercase tracking-widest mb-6 opacity-40">Legal</h4>
                            <ul className="space-y-4 text-sm opacity-70">
                                <li>Privacy</li>
                                <li>Terms</li>
                                <li>Policy</li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div className="pt-16 flex flex-col items-center gap-8">
                    <div className="flex gap-6 opacity-60">
                        {['facebook', 'instagram', 'twitter', 'linkedin'].map(social => (
                            <i key={social} data-lucide={social} className="w-5 h-5 cursor-pointer hover:opacity-100"></i>
                        ))}
                    </div>
                    <p className="text-[10px] text-white/20 text-center max-w-3xl leading-loose">
                        Medical Disclaimer: The information on this website is for informational purposes only and is not intended as a substitute for professional medical advice, diagnosis, or treatment. Always seek the advice of your physician or other qualified health provider with any questions you may have regarding a medical condition.
                    </p>
                    <div className="text-[10px] text-white/40">© 2026 Wellness Inc. All rights reserved.</div>
                </div>
            </footer>
        );

        const App = () => (
            <div>
                <Navbar />
                <Hero />
                <ProductsGrid />
                <ScienceNature />
                <Footer />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
