<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Wellness | Compounded Semaglutide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes mq { from { transform: translateY(0); } to { transform: translateY(-50%); } }
        @keyframes mqr { from { transform: translateY(-50%); } to { transform: translateY(0); } }
        .ani-mq { animation: mq 30s linear infinite; }
        .ani-mqr { animation: mqr 30s linear infinite; }
    </style>
</head>
<body class="antialiased" style="font-family:system-ui,sans-serif; background:hsl(0 0% 98%); color:hsl(11 6% 11%)">
    <div id="root"></div>
    <script type="text/babel">
        const { useEffect } = React;
        const App = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            const products = [{n:'Semaglutide',p:'$296'},{n:'Tirzepatide',p:'$399'},{n:'Liraglutide',p:'$249'}];
            const imgs = ['https://images.unsplash.com/photo-1556228578-0d85b1a4d571?w=300&h=300&fit=crop','https://images.unsplash.com/photo-1587854692152-cbe660dbde88?w=300&h=300&fit=crop','https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=300&h=300&fit=crop','https://images.unsplash.com/photo-1559757148-5c688a4cf2de?w=300&h=300&fit=crop'];
            return (
                <div className="min-h-screen" style={{ background: 'hsl(0 0% 98%)' }}>
                    {/* Navbar */}
                    <nav className="sticky top-0 z-50 bg-gray-50 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <span className="text-xl font-semibold">Logo</span>
                            <div className="hidden md:flex items-center gap-6">
                                {['Weight Loss','Strength','Anti-Aging','Hair Growth','Mood','More'].map(l => <a key={l} href="#" className="text-sm font-medium hover:opacity-70 transition-opacity">{l}</a>)}
                            </div>
                            <div className="flex items-center gap-3">
                                <button className="hidden sm:block px-4 py-2 rounded-full text-sm font-semibold bg-gray-900 text-white">Get started</button>
                                <button className="px-4 py-2 rounded-full text-sm font-medium border-2 bg-white" style={{ borderImage: 'linear-gradient(90deg,#84a9fa,#fb6fec,#fba69e,#fdd4a3,#fb6fec,#84a9fa) 1' }}>
                                    <i data-lucide="user" className="w-4 h-4 inline mr-1"></i>Login
                                </button>
                            </div>
                        </div>
                    </nav>
                    {/* Hero */}
                    <section className="max-w-7xl mx-auto px-6 py-16 grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <div>
                            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white shadow-sm mb-6">
                                <span className="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center"><i data-lucide="star" className="w-3 h-3 text-white fill-white"></i></span>
                                <span className="text-sm">4.5 Average Rating • 453 Reviews</span>
                            </div>
                            <h1 className="text-4xl md:text-5xl lg:text-6xl font-semibold leading-tight mb-8">Compounded Semaglutide for Weight Loss</h1>
                            <div className="space-y-4 mb-8">
                                {[{i:'syringe',t:'FDA-backed compound formulations'},{i:'dollar-sign',t:'Up to 85% savings vs brand name'},{i:'truck',t:'Free express delivery nationwide'}].map(f => (
                                    <div key={f.t} className="flex items-center gap-3"><i data-lucide={f.i} className="w-5 h-5 text-gray-600"></i><span className="text-base">{f.t}</span></div>
                                ))}
                            </div>
                            <div className="border-t pt-6 flex flex-wrap items-center gap-6">
                                <div><span className="text-3xl font-bold">$296</span><span className="text-sm text-gray-500">/mo</span><p className="text-xs text-gray-400 mt-1">*No matter the dose</p></div>
                                <button className="px-6 py-3 rounded-full bg-gray-900 text-white font-semibold">Get Started</button>
                            </div>
                        </div>
                        <div className="hidden lg:flex gap-4 relative overflow-hidden h-[500px]">
                            <div className="absolute top-0 left-0 right-0 h-32 bg-gradient-to-b from-[hsl(0,0%,98%)] to-transparent z-10"></div>
                            <div className="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-[hsl(0,0%,98%)] to-transparent z-10"></div>
                            <div className="flex-1 ani-mq">{[...imgs,...imgs].map((s,i) => <img key={i} src={s} className="w-full rounded-2xl shadow-lg mb-4 aspect-square object-cover" />)}</div>
                            <div className="flex-1 ani-mqr">{[...imgs.reverse(),...imgs].map((s,i) => <img key={i} src={s} className="w-full rounded-2xl shadow-lg mb-4 aspect-square object-cover" />)}</div>
                        </div>
                    </section>
                    {/* Products */}
                    <section className="max-w-7xl mx-auto px-6 py-16 text-center">
                        <p className="text-sm uppercase tracking-widest text-gray-400 mb-2">OUR MEDS</p>
                        <h2 className="text-3xl md:text-4xl font-semibold mb-12">Medication Made Affordable Without The Insurance</h2>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">{products.map(p => (
                            <div key={p.n} className="text-left">
                                <div className="aspect-square rounded-2xl bg-gray-100 shadow-lg mb-4"></div>
                                <h3 className="text-2xl font-semibold">{p.n}</h3>
                                <p className="text-lg">{p.p} <span className="text-sm text-gray-400">per month</span></p>
                                <button className="w-full mt-4 px-4 py-3 rounded-full border-2 border-gray-900 font-medium hover:bg-gray-900 hover:text-white transition-colors">Get Started</button>
                            </div>
                        ))}</div>
                    </section>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
