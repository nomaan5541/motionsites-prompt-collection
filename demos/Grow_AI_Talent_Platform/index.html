<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow | AI Talent Acquisition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(260 87% 3%)',
                        foreground: 'hsl(40 6% 95%)',
                        card: 'hsl(240 6% 9%)',
                        primary: 'hsl(262 83% 58%)',
                        'primary-foreground': 'hsl(0 0% 100%)',
                        secondary: 'hsl(240 4% 16%)',
                        muted: 'hsl(240 4% 16%)',
                        'muted-foreground': 'hsl(240 5% 65%)',
                        accent: 'hsl(262 83% 58%)',
                        border: 'hsl(240 4% 20%)',
                        'hero-heading': 'hsl(40 10% 96%)',
                        'hero-sub': 'hsl(40 6% 82%)',
                    },
                    fontFamily: { body: ['Inter', 'system-ui', 'sans-serif'] },
                    keyframes: { marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } } },
                    animation: { marquee: 'marquee 20s linear infinite' },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .liquid-glass {
                background: rgba(255,255,255,0.01); background-blend-mode: luminosity;
                backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
                border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
                position: relative; overflow: hidden;
            }
            .liquid-glass::before {
                content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
                background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, transparent 40%, transparent 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
                -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
            }
        }
    </style>
</head>
<body class="bg-background text-foreground font-body antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="text/babel">
        const { useEffect, useRef } = React;

        const Navbar = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            return (
                <React.Fragment>
                    <nav className="flex items-center justify-between py-5 px-8">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-primary-foreground font-bold text-sm">G</div>
                        </div>
                        <div className="hidden md:flex items-center gap-1">
                            {['Features', 'Solutions', 'Plans', 'Learning'].map((l, i) => (
                                <button key={l} className="text-foreground/90 text-base px-4 py-2 flex items-center gap-1 hover:text-foreground transition-colors">
                                    {l} {(i === 0 || i === 3) && <i data-lucide="chevron-down" className="w-4 h-4"></i>}
                                </button>
                            ))}
                        </div>
                        <button className="liquid-glass text-foreground rounded-full px-4 py-2 text-sm">Sign Up</button>
                    </nav>
                    <div className="mt-[3px] w-full h-px bg-gradient-to-r from-transparent via-foreground/20 to-transparent"></div>
                </React.Fragment>
            );
        };

        const HeroSection = () => (
            <section className="bg-background relative overflow-hidden">
                <Navbar />
                <div className="pt-20 px-4 flex flex-col items-center text-center">
                    <h1 className="font-normal leading-[1.02] tracking-[-0.024em] bg-clip-text text-transparent" 
                        style={{ fontSize: '230px', backgroundImage: 'linear-gradient(223deg, #E8E8E9 0%, #3A7BBF 104.15%)', fontFamily: "'General Sans', sans-serif" }}>
                        Grow
                    </h1>
                    <p className="text-hero-sub text-center text-lg leading-8 max-w-md mt-4 opacity-80">
                        The most powerful AI ever deployed<br />in talent acquisition
                    </p>
                    <div className="mt-8 mb-[66px]">
                        <button className="liquid-glass text-foreground rounded-full text-base font-normal" style={{ padding: '24px 29px' }}>
                            Schedule a Consult
                        </button>
                    </div>
                </div>
            </section>
        );

        const SocialProofSection = () => {
            const videoRef = useRef(null);
            const logos = ['Vortex', 'Nimbus', 'Prysma', 'Cirrus', 'Kynder', 'Halcyn'];

            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;
                let rafId;
                const fade = () => {
                    if (!video.duration) { rafId = requestAnimationFrame(fade); return; }
                    const t = video.currentTime, d = video.duration;
                    if (t < 0.5) video.style.opacity = t / 0.5;
                    else if (t > d - 0.5) video.style.opacity = (d - t) / 0.5;
                    else video.style.opacity = 1;
                    rafId = requestAnimationFrame(fade);
                };
                video.addEventListener('ended', () => {
                    video.style.opacity = 0;
                    setTimeout(() => { video.currentTime = 0; video.play(); }, 100);
                });
                video.play();
                rafId = requestAnimationFrame(fade);
                return () => cancelAnimationFrame(rafId);
            }, []);

            return (
                <section className="relative w-full overflow-hidden">
                    <video ref={videoRef} src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260308_114720_3dabeb9e-2c39-4907-b747-bc3544e2d5b7.mp4"
                        className="absolute inset-0 w-full h-full object-cover" style={{ opacity: 0 }} muted playsInline />
                    <div className="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background pointer-events-none"></div>
                    
                    <div className="relative z-10 flex flex-col items-center pt-16 pb-24 px-4 gap-20">
                        <div className="h-40"></div>
                        <div className="max-w-5xl w-full flex flex-col md:flex-row items-center gap-8">
                            <p className="text-foreground/50 text-sm shrink-0 whitespace-nowrap">
                                Relied on by brands<br />across the globe
                            </p>
                            <div className="overflow-hidden flex-1">
                                <div className="flex w-max animate-marquee">
                                    {[...logos, ...logos].map((name, i) => (
                                        <div key={i} className="flex items-center gap-3 mx-8">
                                            <div className="liquid-glass w-6 h-6 rounded-lg flex items-center justify-center text-xs font-bold text-foreground">{name[0]}</div>
                                            <span className="text-base font-semibold text-foreground">{name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const App = () => (<div><HeroSection /><SocialProofSection /></div>);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
