<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nickel | Unlock Growth with Every Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { background: 'hsl(249 18% 95%)', foreground: 'hsl(240 10% 10%)', primary: 'hsl(24 90% 55%)', 'primary-fg': 'hsl(0 0% 100%)', 'muted-fg': 'hsl(240 5% 46%)', border: 'hsl(240 10% 88%)', nav: 'hsl(0 0% 100%)' } } } }
    </script>
</head>
<body class="bg-background text-foreground antialiased overflow-x-hidden min-h-screen" style="font-family:'Inter',system-ui,sans-serif">
    <div id="root"></div>
    <script type="text/babel">
        const { useEffect } = React;
        const App = () => {
            useEffect(() => { lucide.createIcons(); }, []);
            return (
                <div className="min-h-screen bg-background">
                    {/* Navbar */}
                    <div className="px-6 lg:px-8 pt-4">
                        <nav className="max-w-7xl mx-auto bg-nav rounded-xl shadow-sm px-8 py-5 flex items-center justify-between">
                            <a href="#" className="flex items-center gap-2 text-2xl font-bold tracking-tight text-foreground">
                                <span className="w-7 h-7 bg-foreground rounded-full flex items-center justify-center"><span className="w-3 h-3 bg-white rounded-sm"></span></span>
                                nickel
                            </a>
                            <div className="hidden md:flex items-center gap-6">
                                {['Products','Company','Pricing','For Accountants'].map((l,i) => (
                                    <button key={l} className="text-base font-medium text-foreground/80 hover:text-foreground transition-colors flex items-center gap-1">
                                        {l} {i<2 && <i data-lucide="chevron-down" className="w-3.5 h-3.5"></i>}
                                    </button>
                                ))}
                            </div>
                            <div className="flex items-center gap-4">
                                <a href="#" className="hidden sm:inline text-base font-medium text-foreground/80 hover:text-foreground transition-colors">Log in</a>
                                <button className="text-lg font-medium text-white rounded-lg px-6 py-3" style={{ background: 'linear-gradient(to bottom, hsl(24,100%,72%), hsl(18,98%,53%))' }}>Get started</button>
                            </div>
                        </nav>
                    </div>

                    {/* Hero */}
                    <section className="relative overflow-hidden" style={{ minHeight: 'calc(100vh - 4rem)' }}>
                        <div className="max-w-7xl mx-auto px-6 lg:px-8 flex items-center w-full relative z-10" style={{ minHeight: 'calc(100vh - 4rem)' }}>
                            <div className="max-w-xl">
                                <h1 className="text-5xl sm:text-6xl lg:text-7xl font-medium tracking-tight text-foreground leading-[1.05]">
                                    Unlock growth with every payment
                                </h1>
                                <p className="mt-6 text-lg sm:text-xl text-muted-fg max-w-xl leading-relaxed">
                                    Run payments, extend net terms and automate collections compliance.
                                </p>
                                <div className="mt-10 flex flex-wrap gap-4">
                                    <button className="h-14 px-10 py-4 text-lg font-medium text-white rounded-lg hover:opacity-90 transition-opacity" style={{ background: 'linear-gradient(to bottom, hsl(24,100%,72%), hsl(18,98%,53%))' }}>Get started</button>
                                    <button className="h-14 px-10 py-4 bg-white text-foreground text-lg font-medium rounded-lg hover:bg-gray-50 transition-colors">Talk to a human</button>
                                </div>
                            </div>
                        </div>
                        <div className="absolute top-0 right-0 w-[55%] h-full hidden lg:block">
                            <video src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260319_192508_4eecde4c-f835-4f4b-b255-eafd1156da99.mp4" className="w-full h-full object-cover rounded-bl-2xl" autoPlay loop muted playsInline />
                        </div>
                    </section>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
